# =============================================================================
# SLAM Toolbox 在线异步建图配置
# 适用于 ROS 2 Humble + 2D 激光雷达
# 运行环境: Docker 容器 (dddmr_x64_navigation)
# =============================================================================

slam_toolbox:
  ros__parameters:

    # ------------------------------------------------------------------
    # 仿真时间
    # ------------------------------------------------------------------
    use_sim_time: true

    # ------------------------------------------------------------------
    # 工作模式
    # mapping  = 同时建图和定位（SLAM 模式，此文件用于建图）
    # localization = 仅使用已有地图进行定位（建图完成后切为此模式）
    # ------------------------------------------------------------------
    mode: mapping

    # ------------------------------------------------------------------
    # 坐标系配置（必须与 URDF 和控制器严格一致）
    # ------------------------------------------------------------------
    odom_frame: odom            # 里程计坐标系（diff_drive_controller 发布 odom→base_footprint）
    map_frame: map              # 地图坐标系（slam_toolbox 发布 map→odom）
    base_frame: base_footprint  # 机器人基座地面投影帧
    scan_topic: /scan           # 激光雷达话题（Gazebo gpu_lidar 插件发布）

    # ------------------------------------------------------------------
    # 建图参数
    # ------------------------------------------------------------------
    # 地图分辨率 (m/pixel)，值越小地图越精细但计算量越大
    resolution: 0.05

    # 初始地图尺寸 [长, 宽, 高] (m)，建图过程中自动扩展
    map_size: [20.0, 20.0, 0.5]

    # 每次扫描更新地图的时间间隔 (s)
    map_update_interval: 1.0

    # ------------------------------------------------------------------
    # 激光扫描匹配参数
    # ------------------------------------------------------------------
    # 扫描队列长度（缓冲几帧激光数据用于匹配）
    scan_queue_size: 10

    # 最小行进距离 (m)，低于此距离不新增关键帧
    minimum_travel_distance: 0.1

    # 最小航向变化 (rad)，低于此角度不新增关键帧
    minimum_travel_heading: 0.1

    # 关键帧之间的最小距离 (m)
    minimum_time_interval: 0.3

    # ------------------------------------------------------------------
    # 回环检测
    # ------------------------------------------------------------------
    # 是否启用回环检测（大的环境中建议开启）
    enable_loop_closure: true

    # 回环搜索半径 (m)
    loop_search_maximum_distance: 5.0

    # 回环匹配最小响应值
    loop_match_minimum_chain_size: 5
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # ------------------------------------------------------------------
    # 扫描匹配器参数
    # ------------------------------------------------------------------
    # 最大迭代次数
    max_iterations: 10

    # 相关性搜索窗口大小
    correlation_search_space_dimension: 0.5

    # 粗分辨率搜索范围 (m)
    coarse_search_angle_offset: 0.349   # ~20°
    coarse_angle_resolution: 0.0349     # ~2°

    # ------------------------------------------------------------------
    # 点云处理
    # ------------------------------------------------------------------
    # 最远有效距离 (m)，超过此值的点丢弃
    max_laser_range: 8.0

    # 最近有效距离 (m)
    minimum_laser_range: 0.15

    # 降采样因子（每 N 个点保留 1 个，减少计算量）
    # 我们的 LiDAR 每圈 360 点，可以用较小的降采样
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.05

    # ------------------------------------------------------------------
    # TF 延迟容忍
    # ------------------------------------------------------------------
    transform_timeout: 0.2            # TF 查询超时
    tf_buffer_duration: 30.0          # TF 缓冲时长
