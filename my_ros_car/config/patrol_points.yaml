# =============================================================================
# 巡检航点配置文件
# 定义机器人自动巡逻时需要依次访问的位置点
# 每个航点格式: [x, y, yaw]
#   x, y  : 在地图坐标系中的位置 (m)
#   yaw   : 到达后的朝向角 (rad)，0=正东, 1.57=正北
# =============================================================================
# 使用方法:
#   1. 先用 SLAM 建图 (ros2 launch my_ros_car slam.launch.py)
#   2. 键盘控制机器人移动到期望位置
#   3. 在 Docker 终端查看当前位姿:
#      ros2 topic echo /amcl_pose --once
#   4. 将坐标填写到下方
# =============================================================================

patrol:
  ros__parameters:
    # 巡检循环模式
    # "loop"       — 循环巡逻 (1→2→3→1→2→3→...)
    # "round_trip" — 往返巡逻 (1→2→3→2→1→2→3→...)
    patrol_mode: "loop"

    # 到达每个航点后的停留时间 (s)，模拟执行巡检任务
    wait_at_point_sec: 3.0

    # 导航超时时间 (s)，超过此时间视为失败
    navigation_timeout_sec: 60.0

    # 失败重试次数
    max_retries: 3

    # =========================================================================
    # 航点列表 (请根据实际地图修改坐标)
    # =========================================================================
    # 以下坐标是示例值，需要根据实际建图结果调整
    waypoints:
      # 格式: [x, y, yaw], label
      - pose: [0.0, 0.0, 0.0]
        label: "起点/充电桩"

      - pose: [3.0, 0.0, 0.0]
        label: "走廊东端"

      - pose: [3.0, 2.0, 1.57]
        label: "走廊东北角"

      - pose: [0.0, 2.0, 3.14]
        label: "走廊西北角"

      - pose: [-2.0, 0.0, 1.57]
        label: "房间A入口"

      - pose: [-2.0, -1.5, 3.14]
        label: "房间B入口"

      - pose: [0.0, -1.5, 0.0]
        label: "走廊南端"
